services:
  postgres:
    image: "postgres:latest"
    restart: unless-stopped
    env_file:
      - .env.secret
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - gde-network
    volumes:
      - postgres_data:/var/lib/postgresql

  pgadmin:
    image: "dpage/pgadmin4:latest"
    restart: unless-stopped
    env_file:
      - .env.secret
    ports:
      - "5050:80"
    networks:
      - gde-network
    depends_on:
      - postgres

  backend:
    build:
      context: ./backend/gde_website
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - '8080:8080'
    env_file:
      - .env.secret
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gde-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - gde-network

networks:
  gde-network:
    driver: bridge

volumes:
  postgres_data:
