name: Hosted documentation site

on:
  push:
    branches:
      - main
      - master
    paths:
      - "docs/**"
      - "README.md"
      - "CHANGELOG.md"
      - "ATTRIBUTION.md"
      - "frontend/README.md"
      - "scripts/db_scripts/mock_scripts/README.md"
      - "observability/grafana/dashboards/README.md"
      - "scripts/build-docs-site.mjs"
      - ".github/workflows/docs-site.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build documentation site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build hosted documentation
        run: node scripts/build-docs-site.mjs

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
          include-hidden-files: true

  deploy:
    name: Deploy documentation site
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
